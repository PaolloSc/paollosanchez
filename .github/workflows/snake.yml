name: Generate Snake Animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: PaolloSc
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#4FC3F7&color_dots=#161b22,#0e3d5c,#0a6fa8,#0288d1,#4FC3F7&color_bg=#0d1117

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
